name: Automated Screenshots

# ============================================================
# ADDING A NEW CITY
# ============================================================
# 1. Add a new job below (copy screenshot-barcelona, rename slug/url/output)
# 2. Chain it: needs: screenshot-<previous>
# 3. Add the slug to KNOWN_LOCATIONS in wetterstation repo:
#    - netlify/functions/screenshot.js
#    - netlify/functions/redirect.js
# 4. Add location config in wetterstation: locations/<slug>/config.json
# 5. Add the dashboard route in wetterstation: netlify.toml
# 6. Create TRMNL private plugin with polling URL:
#    https://wetterdirect.netlify.app/trmnl/<slug>
# ============================================================

on:
  schedule:
    # Single entry every 15 min — frequency logic handled in the "check" job.
    # One cron entry avoids GitHub throttling that occurred with 9 separate entries.
    - cron: '12,27,42,57 * * * *'

  workflow_dispatch:
    inputs:
      job:
        description: 'Which location to run (or all)'
        required: false
        type: choice
        options:
          - all
          - barcelona
          - blankenfelde
        default: all

concurrency:
  group: screenshot
  cancel-in-progress: false

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Decide if this slot should run
        id: decide
        run: |
          H=$(date -u +%-H)
          M=$(date -u +%-M)

          # Schedule (all times UTC, covering CEST UTC+2 and CET UTC+1):
          #   Night   (23-5 UTC):  hourly    → only :57
          #   Waking  (4-6 UTC):   every 30m → :27, :57
          #   Peak    (5-9 UTC):   every 15m → :12, :27, :42, :57
          #   Daytime (9-20 UTC):  every 30m → :27, :57
          #   Wind-down (20-23):   hourly    → :57

          SHOULD_RUN="false"

          if [ "$M" -ge 10 ] && [ "$M" -le 14 ]; then SLOT=12;
          elif [ "$M" -ge 25 ] && [ "$M" -le 29 ]; then SLOT=27;
          elif [ "$M" -ge 40 ] && [ "$M" -le 44 ]; then SLOT=42;
          elif [ "$M" -ge 55 ] || [ "$M" -le 59 ]; then SLOT=57;
          else SLOT=-1; fi

          if [ "$SLOT" -eq 57 ]; then
            SHOULD_RUN="true"
          elif [ "$SLOT" -eq 27 ]; then
            if [ "$H" -ge 4 ] && [ "$H" -le 20 ]; then SHOULD_RUN="true"; fi
          elif [ "$SLOT" -eq 42 ]; then
            if [ "$H" -ge 5 ] && [ "$H" -le 8 ]; then SHOULD_RUN="true"; fi
          elif [ "$SLOT" -eq 12 ]; then
            if [ "$H" -ge 6 ] && [ "$H" -le 9 ]; then SHOULD_RUN="true"; fi
          fi

          echo "UTC time: ${H}:${M}, slot: ${SLOT}, should_run: ${SHOULD_RUN}"
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"

  # ---- BARCELONA (runs first) ----
  screenshot-barcelona:
    runs-on: ubuntu-latest
    needs: check-schedule
    if: |
      always() &&
      ((github.event_name == 'schedule' && needs.check-schedule.outputs.should_run == 'true') ||
       (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'barcelona')))
    env:
      SLUG: barcelona
      SCREENSHOT_URL: https://wetterdirect.netlify.app/barcelona

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('screenshot.js') }}
        restore-keys: ${{ runner.os }}-playwright-
    - run: npm init -y && npm install playwright
    - run: npx playwright install chromium
    - name: Install ImageMagick
      run: command -v convert >/dev/null || (sudo apt-get update && sudo apt-get install -y imagemagick)

    - name: Take screenshot
      env:
        OUTPUT_FILE: '${{ env.SLUG }}.png'
      run: node screenshot.js

    - name: Convert to TRMNL format
      run: |
        convert ${{ env.SLUG }}-raw.png \
          -monochrome -colors 2 -depth 1 -strip \
          png:${{ env.SLUG }}.png
        identify ${{ env.SLUG }}.png

    - name: Commit
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ${{ env.SLUG }}.png
        if ! git diff --cached --quiet; then
          git commit -m "Update ${{ env.SLUG }} $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push
          echo "✅ ${{ env.SLUG }} updated"
        else
          echo "⏭️ ${{ env.SLUG }} unchanged"
        fi

  # ---- BLANKENFELDE (runs after barcelona) ----
  screenshot-blankenfelde:
    runs-on: ubuntu-latest
    needs: [check-schedule, screenshot-barcelona]
    if: |
      always() &&
      ((github.event_name == 'schedule' && needs.check-schedule.outputs.should_run == 'true') ||
       (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'blankenfelde')))
    env:
      SLUG: blankenfelde
      SCREENSHOT_URL: https://wetterdirect.netlify.app/blankenfelde

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('screenshot.js') }}
        restore-keys: ${{ runner.os }}-playwright-
    - run: npm init -y && npm install playwright
    - run: npx playwright install chromium
    - name: Install ImageMagick
      run: command -v convert >/dev/null || (sudo apt-get update && sudo apt-get install -y imagemagick)

    - name: Take screenshot
      env:
        OUTPUT_FILE: '${{ env.SLUG }}.png'
      run: node screenshot.js

    - name: Convert to TRMNL format
      run: |
        convert ${{ env.SLUG }}-raw.png \
          -monochrome -colors 2 -depth 1 -strip \
          png:${{ env.SLUG }}.png
        identify ${{ env.SLUG }}.png

    - name: Commit
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ${{ env.SLUG }}.png
        if ! git diff --cached --quiet; then
          git commit -m "Update ${{ env.SLUG }} $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push
          echo "✅ ${{ env.SLUG }} updated"
        else
          echo "⏭️ ${{ env.SLUG }} unchanged"
        fi
