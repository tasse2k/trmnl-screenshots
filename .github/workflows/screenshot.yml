name: Automated Screenshots

on:
  schedule:
    # Schedule for Barcelona + Blankenfelde (CET/CEST = UTC+1 winter, UTC+2 summer)
    # UTC windows are widened to cover both DST states — no manual adjustment needed.
    # Offset by -3 min so screenshots are ready before device wakes at round times.
    # Avg Action runtime: ~80s. Firing at :57 → committed by :59 → device wakes at :00.
    #
    # Night (1-6am local): hourly — merged UTC window: 23-5
    - cron: '57 23 * * *'
    - cron: '57 0-4 * * *'
    # Waking up (6-7:30am local): every 30 min — merged UTC: 4-6:30
    - cron: '27,57 4-5 * * *'
    - cron: '27 6 * * *'
    # Morning peak (7:30-10:30am local): every 15 min — merged UTC: 5:30-9:30
    - cron: '27,42,57 5 * * *'
    - cron: '12,27,42,57 6-8 * * *'
    - cron: '12,27 9 * * *'
    # Daytime + evening (10:30am-10pm local): every 30 min — merged UTC: 8:30-21
    - cron: '27,57 9-20 * * *'
    # Winding down (10pm-1am local): hourly — merged UTC: 20-0
    - cron: '57 20-23 * * *'

  workflow_dispatch:
    inputs:
      url:
        description: 'URL to screenshot (optional - overrides default)'
        required: false
        type: string
      job:
        description: 'Which job to run (primary or secondary)'
        required: false
        type: choice
        options:
          - primary
          - secondary
          - both
        default: both

jobs:
  screenshot-primary:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'primary' || inputs.job == 'both'))

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('screenshot.js') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install dependencies
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright Chromium
      run: npx playwright install chromium

    - name: Take screenshot
      env:
        SCREENSHOT_URL: ${{ inputs.url || 'https://wetterdirect.netlify.app/dashboard' }}
        OUTPUT_FILE: 'trmnl-screenshot.png'
      run: node screenshot.js

    - name: Convert to TRMNL format
      run: |
        magick trmnl-screenshot-raw.png \
          -dither FloydSteinberg -remap pattern:gray50 \
          -depth 1 -strip \
          png:trmnl-screenshot.png
        echo "Converted to TRMNL format:"
        identify trmnl-screenshot.png

    - name: Commit screenshot
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add trmnl-screenshot.png

        if ! git diff --cached --quiet; then
          git commit -m "Update screenshot 1 $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push
          echo "Screenshot updated and committed"
        else
          echo "No changes to screenshot"
        fi

  screenshot-secondary:
    runs-on: ubuntu-latest
    needs: screenshot-primary
    if: always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'secondary' || inputs.job == 'both')))

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('screenshot.js') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install dependencies
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright Chromium
      run: npx playwright install chromium

    - name: Take screenshot
      env:
        SCREENSHOT_URL: 'https://wetterdirect.netlify.app/blankenfelde'
        OUTPUT_FILE: 'screenshot-2.png'
      run: node screenshot.js

    - name: Convert to TRMNL format
      run: |
        magick screenshot-2-raw.png \
          -dither FloydSteinberg -remap pattern:gray50 \
          -depth 1 -strip \
          png:screenshot-2.png
        echo "Converted to TRMNL format:"
        identify screenshot-2.png

    - name: Commit screenshot
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add screenshot-2.png

        if ! git diff --cached --quiet; then
          git commit -m "Update screenshot 2 $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push
          echo "Screenshot updated and committed"
        else
          echo "No changes to screenshot"
        fi
