name: Automated Screenshots

# ============================================================
# ADDING A NEW CITY
# ============================================================
# 1. Add a new job below (copy screenshot-barcelona, rename slug/url)
# 2. Chain it: needs: screenshot-<previous>
# 3. Add the slug to KNOWN_LOCATIONS / TRMNL_LOCATIONS in wetterstation:
#    - netlify/functions/screenshot.js
#    - netlify/functions/redirect.js
# 4. Add location config: wetterstation/locations/<slug>/config.json
# 5. Add dashboard route: wetterstation/netlify.toml
# 6. Create TRMNL private plugin with polling URL:
#    https://wetterdirect.netlify.app/trmnl/<slug>
# ============================================================

on:
  schedule:
    - cron: '12,27,42,57 * * * *'

  workflow_dispatch:
    inputs:
      job:
        description: 'Which location to run (or all)'
        required: false
        type: choice
        options:
          - all
          - barcelona
          - blankenfelde
        default: all

concurrency:
  group: screenshot
  cancel-in-progress: false

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Decide if this slot should run
        id: decide
        run: |
          H=$(date -u +%-H)
          M=$(date -u +%-M)

          SHOULD_RUN="false"

          if [ "$M" -ge 10 ] && [ "$M" -le 14 ]; then SLOT=12;
          elif [ "$M" -ge 25 ] && [ "$M" -le 29 ]; then SLOT=27;
          elif [ "$M" -ge 40 ] && [ "$M" -le 44 ]; then SLOT=42;
          elif [ "$M" -ge 55 ] || [ "$M" -le 59 ]; then SLOT=57;
          else SLOT=-1; fi

          if [ "$SLOT" -eq 57 ]; then
            SHOULD_RUN="true"
          elif [ "$SLOT" -eq 27 ]; then
            if [ "$H" -ge 4 ] && [ "$H" -le 20 ]; then SHOULD_RUN="true"; fi
          elif [ "$SLOT" -eq 42 ]; then
            if [ "$H" -ge 5 ] && [ "$H" -le 8 ]; then SHOULD_RUN="true"; fi
          elif [ "$SLOT" -eq 12 ]; then
            if [ "$H" -ge 6 ] && [ "$H" -le 9 ]; then SHOULD_RUN="true"; fi
          fi

          echo "UTC time: ${H}:${M}, slot: ${SLOT}, should_run: ${SHOULD_RUN}"
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"

  # ---- BARCELONA (runs first) ----
  screenshot-barcelona:
    runs-on: ubuntu-latest
    needs: check-schedule
    if: |
      always() &&
      ((github.event_name == 'schedule' && needs.check-schedule.outputs.should_run == 'true') ||
       (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'barcelona')))
    env:
      SLUG: barcelona
      SCREENSHOT_URL: https://wetterdirect.netlify.app/barcelona

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('screenshot.js') }}
        restore-keys: ${{ runner.os }}-playwright-
    - run: npm init -y && npm install playwright
    - run: npx playwright install chromium
    - name: Install ImageMagick
      run: command -v convert >/dev/null || (sudo apt-get update && sudo apt-get install -y imagemagick)

    - name: Take screenshot
      env:
        OUTPUT_FILE: '${{ env.SLUG }}.png'
      run: node screenshot.js

    - name: Convert to TRMNL format
      run: |
        convert ${{ env.SLUG }}-raw.png \
          -monochrome -colors 2 -depth 1 -strip \
          png:${{ env.SLUG }}.png
        identify ${{ env.SLUG }}.png

    - name: Extract LAST UPDATE via OCR
      id: ocr
      run: |
        convert ${{ env.SLUG }}-raw.png -crop 250x35+0+28 +repage \
          -resize 500x70 -threshold 50% /tmp/ocr-crop.png
        TEXT=$(tesseract /tmp/ocr-crop.png - --psm 6 2>/dev/null || echo "")
        LAST_UPDATE=$(echo "$TEXT" | grep -oP '\d{1,2}:\d{2}' | head -1)
        echo "OCR: $TEXT -> $LAST_UPDATE"
        echo "last_update=${LAST_UPDATE}" >> "$GITHUB_OUTPUT"

    - name: Append to log
      run: |
        SIZE=$(stat -c%s "${{ env.SLUG }}.png" 2>/dev/null || echo 0)
        LU="${{ steps.ocr.outputs.last_update }}"
        python3 -c "
        import json, os
        f = 'log.json'
        log = json.load(open(f)) if os.path.exists(f) else []
        log.append({
          'ts': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
          'slug': '${{ env.SLUG }}',
          'ok': True,
          'size': $SIZE,
          'lastUpdate': '$LU' if '$LU' else None,
          'runId': '${{ github.run_id }}',
          'elapsed': $SECONDS
        })
        json.dump(log[-500:], open(f, 'w'), indent=2)
        "

    - name: Commit
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ${{ env.SLUG }}.png log.json
        if ! git diff --cached --quiet; then
          git commit -m "Update ${{ env.SLUG }} $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push
        else
          echo "unchanged"
        fi

    - name: Log failure
      if: failure()
      run: |
        python3 -c "
        import json, os
        f = 'log.json'
        log = json.load(open(f)) if os.path.exists(f) else []
        log.append({
          'ts': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
          'slug': '${{ env.SLUG }}',
          'ok': False,
          'size': 0,
          'lastUpdate': None,
          'runId': '${{ github.run_id }}',
          'elapsed': $SECONDS
        })
        json.dump(log[-500:], open(f, 'w'), indent=2)
        "
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add log.json
        git diff --cached --quiet || (git commit -m "Log failure ${{ env.SLUG }}" && git pull --rebase origin main && git push)

  # ---- BLANKENFELDE (runs after barcelona) ----
  screenshot-blankenfelde:
    runs-on: ubuntu-latest
    needs: [check-schedule, screenshot-barcelona]
    if: |
      always() &&
      ((github.event_name == 'schedule' && needs.check-schedule.outputs.should_run == 'true') ||
       (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'blankenfelde')))
    env:
      SLUG: blankenfelde
      SCREENSHOT_URL: https://wetterdirect.netlify.app/blankenfelde

    steps:
    - uses: actions/checkout@v4
    - name: Pull latest (get barcelona's changes)
      run: git pull origin main
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('screenshot.js') }}
        restore-keys: ${{ runner.os }}-playwright-
    - run: npm init -y && npm install playwright
    - run: npx playwright install chromium
    - name: Install ImageMagick
      run: command -v convert >/dev/null || (sudo apt-get update && sudo apt-get install -y imagemagick)

    - name: Take screenshot
      env:
        OUTPUT_FILE: '${{ env.SLUG }}.png'
      run: node screenshot.js

    - name: Convert to TRMNL format
      run: |
        convert ${{ env.SLUG }}-raw.png \
          -monochrome -colors 2 -depth 1 -strip \
          png:${{ env.SLUG }}.png
        identify ${{ env.SLUG }}.png

    - name: Extract LAST UPDATE via OCR
      id: ocr
      run: |
        convert ${{ env.SLUG }}-raw.png -crop 250x35+0+28 +repage \
          -resize 500x70 -threshold 50% /tmp/ocr-crop.png
        TEXT=$(tesseract /tmp/ocr-crop.png - --psm 6 2>/dev/null || echo "")
        LAST_UPDATE=$(echo "$TEXT" | grep -oP '\d{1,2}:\d{2}' | head -1)
        echo "OCR: $TEXT -> $LAST_UPDATE"
        echo "last_update=${LAST_UPDATE}" >> "$GITHUB_OUTPUT"

    - name: Append to log
      run: |
        SIZE=$(stat -c%s "${{ env.SLUG }}.png" 2>/dev/null || echo 0)
        LU="${{ steps.ocr.outputs.last_update }}"
        python3 -c "
        import json, os
        f = 'log.json'
        log = json.load(open(f)) if os.path.exists(f) else []
        log.append({
          'ts': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
          'slug': '${{ env.SLUG }}',
          'ok': True,
          'size': $SIZE,
          'lastUpdate': '$LU' if '$LU' else None,
          'runId': '${{ github.run_id }}',
          'elapsed': $SECONDS
        })
        json.dump(log[-500:], open(f, 'w'), indent=2)
        "

    - name: Commit
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ${{ env.SLUG }}.png log.json
        if ! git diff --cached --quiet; then
          git commit -m "Update ${{ env.SLUG }} $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push
        else
          echo "unchanged"
        fi

    - name: Log failure
      if: failure()
      run: |
        python3 -c "
        import json, os
        f = 'log.json'
        log = json.load(open(f)) if os.path.exists(f) else []
        log.append({
          'ts': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
          'slug': '${{ env.SLUG }}',
          'ok': False,
          'size': 0,
          'lastUpdate': None,
          'runId': '${{ github.run_id }}',
          'elapsed': $SECONDS
        })
        json.dump(log[-500:], open(f, 'w'), indent=2)
        "
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add log.json
        git diff --cached --quiet || (git commit -m "Log failure ${{ env.SLUG }}" && git pull --rebase origin main && git push)
