name: Automated Screenshots

on:
  schedule:
    # Single entry every 15 min — frequency logic handled in the "check" job.
    # One cron entry avoids GitHub throttling that occurred with 9 separate entries.
    - cron: '12,27,42,57 * * * *'

  workflow_dispatch:
    inputs:
      job:
        description: 'Which location to run (or all)'
        required: false
        type: choice
        options:
          - all
          - barcelona
          - blankenfelde
        default: all

concurrency:
  group: screenshot
  cancel-in-progress: false

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Decide if this slot should run
        id: decide
        run: |
          H=$(date -u +%-H)
          M=$(date -u +%-M)

          # Schedule (all times UTC, covering CEST UTC+2 and CET UTC+1):
          #   Night   (23-5 UTC):  hourly    → only :57
          #   Waking  (4-6 UTC):   every 30m → :27, :57
          #   Peak    (5-9 UTC):   every 15m → :12, :27, :42, :57
          #   Daytime (9-20 UTC):  every 30m → :27, :57
          #   Wind-down (20-23):   hourly    → :57

          SHOULD_RUN="false"

          if [ "$M" -ge 10 ] && [ "$M" -le 14 ]; then SLOT=12;
          elif [ "$M" -ge 25 ] && [ "$M" -le 29 ]; then SLOT=27;
          elif [ "$M" -ge 40 ] && [ "$M" -le 44 ]; then SLOT=42;
          elif [ "$M" -ge 55 ] || [ "$M" -le 59 ]; then SLOT=57;
          else SLOT=-1; fi

          if [ "$SLOT" -eq 57 ]; then
            SHOULD_RUN="true"
          elif [ "$SLOT" -eq 27 ]; then
            if [ "$H" -ge 4 ] && [ "$H" -le 20 ]; then SHOULD_RUN="true"; fi
          elif [ "$SLOT" -eq 42 ]; then
            if [ "$H" -ge 5 ] && [ "$H" -le 8 ]; then SHOULD_RUN="true"; fi
          elif [ "$SLOT" -eq 12 ]; then
            if [ "$H" -ge 6 ] && [ "$H" -le 9 ]; then SHOULD_RUN="true"; fi
          fi

          echo "UTC time: ${H}:${M}, slot: ${SLOT}, should_run: ${SHOULD_RUN}"
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"

  screenshot:
    runs-on: ubuntu-latest
    needs: check-schedule
    if: |
      always() &&
      ((github.event_name == 'schedule' && needs.check-schedule.outputs.should_run == 'true') ||
       github.event_name == 'workflow_dispatch')

    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- ADD NEW CITIES HERE ----
          # slug: used as filename ({slug}.png) and Netlify endpoint (/img/{slug})
          # url:  the weather dashboard URL to screenshot
          - slug: barcelona
            url: https://wetterdirect.netlify.app/barcelona
          - slug: blankenfelde
            url: https://wetterdirect.netlify.app/blankenfelde

    steps:
    - name: Check if this location should run
      id: filter
      if: github.event_name == 'workflow_dispatch'
      run: |
        if [ "${{ inputs.job }}" = "all" ] || [ "${{ inputs.job }}" = "${{ matrix.slug }}" ]; then
          echo "run=true" >> "$GITHUB_OUTPUT"
        else
          echo "run=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout repository
      if: github.event_name == 'schedule' || steps.filter.outputs.run != 'false'
      uses: actions/checkout@v4

    - name: Setup Node.js
      if: github.event_name == 'schedule' || steps.filter.outputs.run != 'false'
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Cache Playwright browsers
      if: github.event_name == 'schedule' || steps.filter.outputs.run != 'false'
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('screenshot.js') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install dependencies
      if: github.event_name == 'schedule' || steps.filter.outputs.run != 'false'
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright Chromium
      if: github.event_name == 'schedule' || steps.filter.outputs.run != 'false'
      run: npx playwright install chromium

    - name: Install ImageMagick
      if: github.event_name == 'schedule' || steps.filter.outputs.run != 'false'
      run: command -v convert >/dev/null || (sudo apt-get update && sudo apt-get install -y imagemagick)

    - name: Take screenshot
      if: github.event_name == 'schedule' || steps.filter.outputs.run != 'false'
      env:
        SCREENSHOT_URL: ${{ matrix.url }}
        OUTPUT_FILE: '${{ matrix.slug }}.png'
      run: node screenshot.js

    - name: Convert to TRMNL format
      if: github.event_name == 'schedule' || steps.filter.outputs.run != 'false'
      run: |
        # 1-bit monochrome PNG per TRMNL spec
        # https://docs.trmnl.com/go/diy/imagemagick-guide
        convert ${{ matrix.slug }}-raw.png \
          -monochrome -colors 2 -depth 1 \
          -strip \
          png:${{ matrix.slug }}.png
        echo "Converted to TRMNL format:"
        identify ${{ matrix.slug }}.png

    - name: Commit screenshot
      if: github.event_name == 'schedule' || steps.filter.outputs.run != 'false'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add ${{ matrix.slug }}.png

        if ! git diff --cached --quiet; then
          git commit -m "Update ${{ matrix.slug }} $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push
          echo "Screenshot updated and committed"
        else
          echo "No changes to screenshot"
        fi
