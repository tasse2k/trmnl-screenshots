            });

            // Wait for fonts to load completely
            await page.evaluate(async () => {
              await document.fonts.ready;
              const fontFaces = Array.from(document.fonts);
              await Promise.all(fontFaces.map(async (font) => {
                try { await font.loaded; } catch (e) {}
              }));
              const testFonts = ['Inter', 'Roboto', 'Arial', 'sans-serif'];
              for (const fontFamily of testFonts) {
                try { await document.fonts.load(`16px "${fontFamily}"`); } catch (e) {}
              }
              return new Promise((resolve) => {
                if (document.fonts.status === 'loaded') { resolve(); }
                else {
