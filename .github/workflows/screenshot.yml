name: Automated Screenshots

on:
  schedule:
    # Single entry every 15 min — frequency logic handled in the "check" job.
    # One cron entry avoids GitHub throttling that occurred with 9 separate entries.
    - cron: '12,27,42,57 * * * *'

  workflow_dispatch:
    inputs:
      url:
        description: 'URL to screenshot (optional - overrides default)'
        required: false
        type: string
      job:
        description: 'Which job to run (primary or secondary)'
        required: false
        type: choice
        options:
          - primary
          - secondary
          - both
        default: both

concurrency:
  group: screenshot
  cancel-in-progress: false

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Decide if this slot should run
        id: decide
        run: |
          # Current UTC hour and minute
          H=$(date -u +%-H)
          M=$(date -u +%-M)

          # Schedule (all times UTC, covering CEST UTC+2 and CET UTC+1):
          #   Night   (23-5 UTC):  hourly    → only :57
          #   Waking  (4-6 UTC):   every 30m → :27, :57
          #   Peak    (5-9 UTC):   every 15m → :12, :27, :42, :57
          #   Daytime (9-20 UTC):  every 30m → :27, :57
          #   Wind-down (20-23):   hourly    → :57

          SHOULD_RUN="false"

          # Round minute to nearest slot
          if [ "$M" -ge 10 ] && [ "$M" -le 14 ]; then SLOT=12;
          elif [ "$M" -ge 25 ] && [ "$M" -le 29 ]; then SLOT=27;
          elif [ "$M" -ge 40 ] && [ "$M" -le 44 ]; then SLOT=42;
          elif [ "$M" -ge 55 ] || [ "$M" -le 59 ]; then SLOT=57;
          else SLOT=-1; fi

          if [ "$SLOT" -eq 57 ]; then
            # :57 runs every hour (all periods)
            SHOULD_RUN="true"
          elif [ "$SLOT" -eq 27 ]; then
            # :27 runs during waking (4-6), peak (5-9), daytime (9-20)
            if [ "$H" -ge 4 ] && [ "$H" -le 20 ]; then SHOULD_RUN="true"; fi
          elif [ "$SLOT" -eq 42 ]; then
            # :42 runs during peak only (5-8)
            if [ "$H" -ge 5 ] && [ "$H" -le 8 ]; then SHOULD_RUN="true"; fi
          elif [ "$SLOT" -eq 12 ]; then
            # :12 runs during peak only (6-9)
            if [ "$H" -ge 6 ] && [ "$H" -le 9 ]; then SHOULD_RUN="true"; fi
          fi

          echo "UTC time: ${H}:${M}, slot: ${SLOT}, should_run: ${SHOULD_RUN}"
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"

  screenshot-primary:
    runs-on: ubuntu-latest
    needs: check-schedule
    if: |
      (github.event_name == 'schedule' && needs.check-schedule.outputs.should_run == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'primary' || inputs.job == 'both'))

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('screenshot.js') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install dependencies
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright Chromium
      run: npx playwright install chromium

    - name: Install ImageMagick
      run: command -v convert >/dev/null || (sudo apt-get update && sudo apt-get install -y imagemagick)

    - name: Take screenshot
      env:
        SCREENSHOT_URL: ${{ inputs.url || 'https://wetterdirect.netlify.app/dashboard' }}
        OUTPUT_FILE: 'trmnl-screenshot.png'
      run: node screenshot.js

    - name: Convert to TRMNL format
      run: |
        # 1-bit monochrome PNG per TRMNL spec
        # https://docs.trmnl.com/go/diy/imagemagick-guide
        convert trmnl-screenshot-raw.png \
          -monochrome -colors 2 -depth 1 \
          -strip \
          png:trmnl-screenshot.png
        echo "Converted to TRMNL format:"
        identify trmnl-screenshot.png

    - name: Commit screenshot
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull --rebase origin main
        git add trmnl-screenshot.png

        if ! git diff --cached --quiet; then
          git commit -m "Update screenshot 1 $(date +'%Y-%m-%d %H:%M:%S')"
          git push
          echo "Screenshot updated and committed"
        else
          echo "No changes to screenshot"
        fi

  screenshot-secondary:
    runs-on: ubuntu-latest
    needs: check-schedule
    if: |
      (github.event_name == 'schedule' && needs.check-schedule.outputs.should_run == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'secondary' || inputs.job == 'both'))

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('screenshot.js') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install dependencies
      run: |
        npm init -y
        npm install playwright

    - name: Install Playwright Chromium
      run: npx playwright install chromium

    - name: Install ImageMagick
      run: command -v convert >/dev/null || (sudo apt-get update && sudo apt-get install -y imagemagick)

    - name: Take screenshot
      env:
        SCREENSHOT_URL: 'https://wetterdirect.netlify.app/blankenfelde'
        OUTPUT_FILE: 'screenshot-2.png'
      run: node screenshot.js

    - name: Convert to TRMNL format
      run: |
        convert screenshot-2-raw.png \
          -monochrome -colors 2 -depth 1 \
          -strip \
          png:screenshot-2.png
        echo "Converted to TRMNL format:"
        identify screenshot-2.png

    - name: Commit screenshot
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git pull --rebase origin main
        git add screenshot-2.png

        if ! git diff --cached --quiet; then
          git commit -m "Update screenshot 2 $(date +'%Y-%m-%d %H:%M:%S')"
          git push
          echo "Screenshot updated and committed"
        else
          echo "No changes to screenshot"
        fi
